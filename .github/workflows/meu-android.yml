name: Meu Build Android

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Arquitetura(s) a compilar"
        type: choice
        default: "all"
        options:
          - "all"
          - "arm64-v8a"
          - "armeabi-v7a"
          - "x86_64"

permissions:
  contents: read

env:
  RUST_VERSION: "1.75"
  CARGO_NDK_VERSION: "3.1.2"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r28c"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VERSION: "1.4.8"
  # Servidor / chave / senha embutidos em tempo de compilação (config.rs lê via option_env!)
  RENDEZVOUS_SERVER: "${{ secrets.RENDEZVOUS_SERVER }}"
  RS_PUB_KEY: "${{ secrets.RS_PUB_KEY }}"
  API_SERVER: "${{ secrets.API_SERVER }}"
  PRESET_PASSWORD: "${{ secrets.PRESET_PASSWORD }}"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  set-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Build matrix from input
        id: set
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.arch }}" == "all" ]]; then
            echo 'matrix=["arm64-v8a","armeabi-v7a","x86_64"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.arch }}"]' >> $GITHUB_OUTPUT
          fi

  build-android:
    needs: [generate-bridge, set-matrix]
    name: build android apk (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Resolve target triple
        id: triple
        shell: bash
        run: |
          case "${{ matrix.arch }}" in
            arm64-v8a)   echo "target=aarch64-linux-android"     >> $GITHUB_OUTPUT; echo "platform=android-arm64" >> $GITHUB_OUTPUT; echo "ndk=ndk_arm64.sh"  >> $GITHUB_OUTPUT; echo "libdir=aarch64-linux-android" >> $GITHUB_OUTPUT ;;
            armeabi-v7a) echo "target=armv7-linux-androideabi"  >> $GITHUB_OUTPUT; echo "platform=android-arm"   >> $GITHUB_OUTPUT; echo "ndk=ndk_arm.sh"    >> $GITHUB_OUTPUT; echo "libdir=arm-linux-androideabi" >> $GITHUB_OUTPUT ;;
            x86_64)      echo "target=x86_64-linux-android"     >> $GITHUB_OUTPUT; echo "platform=android-x64"   >> $GITHUB_OUTPUT; echo "ndk=ndk_x64.sh"    >> $GITHUB_OUTPUT; echo "libdir=x86_64-linux-android" >> $GITHUB_OUTPUT ;;
          esac

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
               clang \
               cmake \
               curl \
               gcc-multilib \
               git \
               g++ \
               g++-multilib \
               libayatana-appindicator3-dev \
               libasound2-dev \
               libc6-dev \
               libclang-dev \
               libunwind-dev \
               libgstreamer1.0-dev \
               libgstreamer-plugins-base1.0-dev \
               libgtk-3-dev \
               libpam0g-dev \
               libpulse-dev \
               libva-dev \
               libxcb-randr0-dev \
               libxcb-shape0-dev \
               libxcb-xfixes0-dev \
               libxdo-dev \
               libxfixes-dev \
               llvm-dev \
               nasm \
               ninja-build \
               openjdk-17-jdk-headless \
               pkg-config \
               tree \
               wget

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}

      - name: Patch flutter
        run: |
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{ env.ANDROID_FLUTTER_VERSION }} ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff

      - uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if ! ./flutter/build_android_deps.sh "${{ matrix.arch }}"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; echo "======"; cat "$_1"; echo "======"; echo ""
            done
            exit 1
          fi

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: meu-rustdesk-android
          key: ${{ steps.triple.outputs.target }}

      - name: Build rustdesk lib
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add ${{ steps.triple.outputs.target }}
          cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
          ./flutter/${{ steps.triple.outputs.ndk }}
          mkdir -p ./flutter/android/app/src/main/jniLibs/${{ matrix.arch }}
          cp ./target/${{ steps.triple.outputs.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/${{ matrix.arch }}/librustdesk.so

      - name: Build APK
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" ./flutter/android/gradle.properties
          # assina com a chave de debug para gerar um APK instalavel sem precisar de secrets de assinatura
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" ./flutter/android/app/build.gradle
          mkdir -p ./flutter/android/app/src/main/jniLibs/${{ matrix.arch }}
          cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${{ steps.triple.outputs.libdir }}/libc++_shared.so ./flutter/android/app/src/main/jniLibs/${{ matrix.arch }}/
          cp ./target/${{ steps.triple.outputs.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/${{ matrix.arch }}/librustdesk.so
          pushd flutter
          flutter build apk --release --target-platform ${{ steps.triple.outputs.platform }} --split-per-abi
          popd
          mv flutter/build/app/outputs/flutter-apk/app-${{ matrix.arch }}-release.apk \
             rustdesk-${{ env.VERSION }}-${{ matrix.arch }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-${{ env.VERSION }}-${{ matrix.arch }}
          path: rustdesk-${{ env.VERSION }}-${{ matrix.arch }}.apk
          if-no-files-found: error
